<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Browse Library — Project Yellow Bird</title>
  <link rel="stylesheet" href="/styles/site.css"/>
</head>
<body>
  <a class="skip-link" href="#results-region">Skip to results</a>

  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/"><span class="dot"></span> Project Yellow Bird</a>
      <nav class="nav">
        <a class="active" href="/browse">Browse Library</a>
        <a href="/faq">FAQ</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
      </nav>
    </div>
  </div>

  <div class="container">
    <h1 class="h1">Browse Library</h1>
    <p class="lede">Ready-to-print worksheets for Ontario K-6 math.</p>

    <div class="grid">
      <aside class="card">
        <label class="label" for="q">Search</label>
        <input id="q" class="input" placeholder="Try: ten frame, addition, Grade 2..." />

        <div class="hr"></div>

        <label class="label" for="grade">Grade</label>
        <select id="grade" class="select">
          <option value="">All grades</option>
        </select>

        <div style="height:12px"></div>

        <label class="label" for="domain">Domain</label>
        <select id="domain" class="select">
          <option value="">All domains</option>
        </select>

        <div style="height:12px"></div>

        <label class="label" for="worksheetFamily">Worksheet type</label>
        <select id="worksheetFamily" class="select">
          <option value="">All types</option>
        </select>

        <div style="height:12px"></div>

        <label class="label" for="templateId">Format</label>
        <select id="templateId" class="select">
          <option value="">All formats</option>
        </select>

        <div style="height:12px"></div>

        <label class="label" for="difficulty">Difficulty</label>
        <select id="difficulty" class="select">
          <option value="">All difficulty levels</option>
        </select>

        <div class="hr"></div>

        <label class="check">
          <input id="hasAnswerKey" type="checkbox"/>
          <span>Answer key included</span>
        </label>

        <div class="hr"></div>

        <label class="label" for="sort">Sort</label>
        <select id="sort" class="select">
          <option value="title">Title</option>
          <option value="grade">Grade</option>
          <option value="time">Estimated time</option>
        </select>

        <div style="height:18px"></div>

        <div class="row">
          <button id="apply" class="btn primary">Apply</button>
          <button id="clear" class="btn">Clear</button>
        </div>

        <div class="hr"></div>

      </aside>

      <main id="results-region" tabindex="-1" aria-label="Worksheet results">
        <div id="summary" class="resource-meta"></div>
        <div id="results" class="results"></div>

        <div id="empty" class="card" style="display:none; margin-top:18px;">
          <h3 class="resource-title" style="margin:0 0 6px 0;">No worksheets found</h3>
          <div class="resource-meta">Try widening filters or searching a different keyword.</div>
        </div>
      </main>
    </div>
  </div>

  <div class="footer">© Project Yellow Bird — calm, print-first resources.</div>

<script>
  const el = (id) => document.getElementById(id);
  const state = {
    allItems: [],
    visibleItems: []
  };

  function escapeHtml(value = "") {
    return String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  const friendlyLabels = {
    addition_subtraction_facts: "Addition & subtraction facts",
    addition_strategies: "Addition strategies",
    subtraction_strategies: "Subtraction strategies",
    multiplication_facts: "Multiplication facts",
    division_facts: "Division facts",
    skip_counting: "Skip counting",
    place_value: "Place value",
    base_ten_blocks: "Base ten blocks",
    number_lines: "Number lines",
    ten_frames: "Ten frames",
    fractions: "Fractions",
    data_graphing: "Data interpretation",
    graphing: "Data interpretation",
    word_problems: "Word problems",
    fact_fluency: "Fact fluency",
    problem_solving: "Word problems",
    relational_thinking: "Number relationships",
    daily_review: "Skip counting",
    visual_models: "Visual models",
    visual_model: "Visual model",
    representation: "Number forms",
    place_value_representation: "Place value practice",
    fluency_grid: "Fluency practice",
    equation_practice: "Equation practice",
    matching: "Matching",
    model_interpretation: "Model interpretation",
    related_subtraction: "Subtraction facts",
    missing_addend: "Missing addends",
    missing_factor: "Missing factors",
    fact_family: "Fact relationships",
    compare_numbers: "Compare numbers",
    number_line_identify: "Number line practice",
    number_word_match: "Number word match",
    expanded_form: "Expanded form",
    standard_form: "Standard form",
    skip_counting: "Skip counting",
    complete_graph: "Text-based graph questions",
    read_graph: "Text-based graph questions",
    graph_questions: "Text-based graph questions",
    interpret_data: "Data interpretation",
    match_data_to_graph: "Text-based graph questions",
    equal_groups: "Equal groups",
    array: "Arrays",
    math_addition_basic: "Addition facts",
    "math.addition.basic": "Addition facts",
    math_subtraction_nonnegative: "Subtraction facts",
    "math.subtraction.nonnegative": "Subtraction facts",
    math_multiplication_basic: "Multiplication facts",
    "math.multiplication.basic": "Multiplication facts",
    math_division_integer: "Division facts",
    "math.division.integer": "Division facts",
    graph_reading: "Text-based graph questions",
    "math.data.graph_reading": "Text-based graph questions"
  };

  function titleCase(value = "") {
    return String(value || "")
      .replace(/[_\.]+/g, " ")
      .replace(/\s+/g, " ")
      .trim()
      .replace(/\b\w/g, (letter) => letter.toUpperCase());
  }

  function niceLabel(value = "") {
    const key = String(value || "").trim();
    return friendlyLabels[key] || friendlyLabels[key.toLowerCase()] || titleCase(key);
  }

  function worksheetTypeLabel(item) {
    const activityTypes = item.activityTypes || [];
    if (item.worksheetFamily === "relational_thinking") {
      if (activityTypes.includes("fact_family") || String(item.skillKey || "").includes("multiplication")) {
        return "Fact relationships";
      }
      return "Number relationships";
    }

    if (item.worksheetFamily === "representation" && item.domain === "Place Value") {
      return "Number forms";
    }

    if (item.worksheetFamily === "daily_review" && activityTypes.includes("skip_counting")) {
      return "Skip counting";
    }

    return niceLabel(item.worksheetFamily || item.skillKey || "");
  }

  function worksheetFormatLabel(item) {
    if (item.templateId === "representation" && item.domain === "Place Value") {
      return "Place value practice";
    }

    return niceLabel(item.templateId || "");
  }

  function domainLabel(item) {
    const domain = String(item.domain || "");
    if (/data|graph/i.test(domain)) return "Data interpretation";
    return domain;
  }

  function badge(text) {
    if (!text) return "";
    return `<span class="badge">${escapeHtml(text)}</span>`;
  }

  function uniqueSorted(values) {
    return [...new Set(values.filter(Boolean).map((value) => String(value).trim()))]
      .sort((a, b) => a.localeCompare(b));
  }

  function fillSelect(selectId, values, labelFormatter = (value) => value) {
    const select = el(selectId);
    const first = select.options[0];
    select.innerHTML = "";
    select.appendChild(first);

    values.forEach((value) => {
      const option = document.createElement("option");
      option.value = value;
      option.textContent = labelFormatter(value);
      select.appendChild(option);
    });
  }

  function populateFilters(items) {
    fillSelect(
      "grade",
      uniqueSorted(items.flatMap((item) => item.grades || [])),
      (grade) => {
        const match = items.find((item) => (item.grades || []).includes(grade));
        return match?.gradeLabels?.[0] || niceLabel(grade);
      }
    );
    fillSelect("domain", uniqueSorted(items.map((item) => item.domain)), (value) => {
      return /data|graph/i.test(value) ? "Data interpretation" : value;
    });
    fillSelect("worksheetFamily", uniqueSorted(items.map((item) => item.worksheetFamily)), niceLabel);
    fillSelect("templateId", uniqueSorted(items.map((item) => item.templateId)), niceLabel);
    fillSelect("difficulty", uniqueSorted(items.map((item) => item.difficulty)), niceLabel);
  }

  function itemMatchesSearch(item, query) {
    if (!query) return true;

    const haystack = [
      item.id,
      item.title,
      item.shortTitle,
      item.subject,
      item.domain,
      item.skillKey,
      item.worksheetFamily,
      item.templateId,
      item.difficulty,
      ...(item.grades || []),
      ...(item.gradeLabels || []),
      ...(item.activityTypes || []),
      ...(item.tags || []),
      ...(item.curriculumTags || []),
      item.description
    ]
      .filter(Boolean)
      .join(" ")
      .toLowerCase();

    return haystack.includes(query.toLowerCase());
  }

  function applyFilters() {
    const query = el("q").value.trim();
    const grade = el("grade").value;
    const domain = el("domain").value;
    const worksheetFamily = el("worksheetFamily").value;
    const templateId = el("templateId").value;
    const difficulty = el("difficulty").value;
    const hasAnswerKey = el("hasAnswerKey").checked;

    state.visibleItems = state.allItems.filter((item) => {
      return (
        item.status === "ready" &&
        itemMatchesSearch(item, query) &&
        (!grade || (item.grades || []).includes(grade)) &&
        (!domain || item.domain === domain) &&
        (!worksheetFamily || item.worksheetFamily === worksheetFamily) &&
        (!templateId || item.templateId === templateId) &&
        (!difficulty || item.difficulty === difficulty) &&
        (!hasAnswerKey || Boolean(item.hasAnswerKey))
      );
    });

    sortVisibleItems();
    render();
  }

  function sortVisibleItems() {
    const sortBy = el("sort").value;

    state.visibleItems.sort((a, b) => {
      if (sortBy === "grade") {
        const gradeCompare = String(a.gradeLabels?.[0] || "").localeCompare(String(b.gradeLabels?.[0] || ""));
        return gradeCompare || String(a.title || "").localeCompare(String(b.title || ""));
      }

      if (sortBy === "time") {
        const timeCompare = Number(a.estimatedTimeMinutes || 0) - Number(b.estimatedTimeMinutes || 0);
        return timeCompare || String(a.title || "").localeCompare(String(b.title || ""));
      }

      return String(a.title || "").localeCompare(String(b.title || ""));
    });
  }

  function previewUrl(id) {
    return `/catalog-preview.html?id=${encodeURIComponent(id)}`;
  }

  function pdfUrl(id) {
    return `/api/catalog-pdf/${encodeURIComponent(id)}?disposition=inline`;
  }

  function detailUrl(id) {
    return `/resource/worksheet/${encodeURIComponent(id)}`;
  }

  function renderCard(item) {
    const badges = [
      ...(item.gradeLabels || []).map(badge),
      badge(worksheetTypeLabel(item)),
      badge(worksheetFormatLabel(item)),
      item.estimatedTimeMinutes ? badge(`${item.estimatedTimeMinutes} min`) : "",
      item.hasAnswerKey ? badge("Answer Key") : ""
    ].join("");

    return `
      <article class="card resource-card">
        <div class="resource-card-main">
          <div class="resource-meta">
            <span>${escapeHtml((item.gradeLabels || []).join(", ") || "All grades")}</span>
            ${item.domain ? `<span>•</span><span>${escapeHtml(domainLabel(item))}</span>` : ""}
            ${item.difficulty ? `<span>•</span><span>${escapeHtml(niceLabel(item.difficulty))}</span>` : ""}
          </div>

          <h3 class="resource-title">${escapeHtml(item.title || "Untitled worksheet")}</h3>
          <div class="resource-desc">${escapeHtml(item.description || "")}</div>
          <div class="badges">${badges}</div>
        </div>

        <div class="resource-actions">
          <a class="btn" href="${detailUrl(item.id)}">Details</a>
          <a class="btn" href="${previewUrl(item.id)}" target="_blank" rel="noopener">Preview</a>
          <a class="btn primary" href="${pdfUrl(item.id)}" target="_blank" rel="noopener">PDF</a>
        </div>
      </article>
    `;
  }

  function render() {
    const total = state.allItems.length;
    const visible = state.visibleItems.length;

    el("summary").textContent =
      visible === total
        ? `${total} ready worksheet${total === 1 ? "" : "s"}`
        : `${visible} of ${total} ready worksheet${total === 1 ? "" : "s"}`;

    el("empty").style.display = visible ? "none" : "block";
    el("results").innerHTML = visible ? state.visibleItems.map(renderCard).join("") : "";
  }

  async function loadCatalog() {
    el("summary").textContent = "Loading ready worksheets...";
    el("empty").style.display = "none";
    el("results").innerHTML = "";

    try {
      const res = await fetch("/api/worksheet-catalog?status=ready");
      const data = await res.json();

      if (!data.ok) {
        el("summary").textContent = "Error loading worksheets.";
        return;
      }

      state.allItems = Array.isArray(data.items)
        ? data.items.filter((item) => item.status === "ready")
        : [];

      populateFilters(state.allItems);
      applyFilters();
    } catch (error) {
      el("summary").textContent = "Error loading worksheets.";
    }
  }

  function clearFilters() {
    el("q").value = "";
    el("grade").value = "";
    el("domain").value = "";
    el("worksheetFamily").value = "";
    el("templateId").value = "";
    el("difficulty").value = "";
    el("hasAnswerKey").checked = false;
    el("sort").value = "title";
    applyFilters();
  }

  ["grade", "domain", "worksheetFamily", "templateId", "difficulty", "hasAnswerKey", "sort"].forEach((id) => {
    el(id).addEventListener("change", applyFilters);
  });

  el("apply").addEventListener("click", applyFilters);
  el("clear").addEventListener("click", clearFilters);
  el("q").addEventListener("input", applyFilters);
  el("q").addEventListener("keydown", (event) => {
    if (event.key === "Enter") applyFilters();
  });

  loadCatalog();
</script>
</body>
</html>
