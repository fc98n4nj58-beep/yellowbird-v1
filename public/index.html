<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Yellowbird</title>
  <style>
    body {
      margin: 0;
      font-family: Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f5f5f5;
    }

    .container {
      text-align: center;
    }

    h1 {
      font-size: 32px;
      letter-spacing: 2px;
      margin-bottom: 60px;
    }

    .btn {
      display: block;
      width: 280px;
      padding: 18px;
      margin: 20px auto;
      font-size: 16px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      background: black;
      color: white;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>YELLOWBIRD</h1>

    <button class="btn" onclick="location.href='/worksheet'">
      WORKSHEET GENERATOR
    </button>

    <button class="btn" onclick="location.href='/units'">
      UNIT GENERATOR
    </button>
  </div>

</body>
</html>
