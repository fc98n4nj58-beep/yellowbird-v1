<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Resource — Project Yellow Bird</title>
  <link rel="stylesheet" href="/styles/site.css"/>
  <style>
    @font-face{ font-family:"Source Sans 3"; src:url("/fonts/SourceSans3/SourceSans3-Regular.ttf") format("truetype"); font-weight:400; font-style:normal; }
    @font-face{ font-family:"Source Sans 3"; src:url("/fonts/SourceSans3/SourceSans3-Bold.ttf") format("truetype"); font-weight:700; font-style:normal; }
    @font-face{ font-family:"Source Sans 3"; src:url("/fonts/SourceSans3/SourceSans3-Light.ttf") format("truetype"); font-weight:300; font-style:normal; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/"><span class="dot"></span> Project Yellow Bird</a>
      <nav class="nav">
        <a href="/browse">Browse Library</a>
        <a href="/worksheet">Worksheet Generator</a>
        <a href="/units">Unit Generator</a>
        <a href="/faq">FAQ</a>
      </nav>
    </div>
  </div>

  <div class="container">
    <a href="/browse" class="resource-meta">← Back to Browse</a>
    <div style="height:12px"></div>

    <div class="grid">
      <!-- Left: Preview / content -->
      <main class="card">
        <div id="meta" class="resource-meta"></div>
        <h1 id="title" class="h1" style="margin-top:6px;"></h1>
        <p id="desc" class="lede" style="margin-bottom:18px;"></p>

        <div id="badges" class="badges"></div>

        <div class="hr"></div>

        <div class="label">What you get</div>
        <div id="files"></div>

        <div class="hr"></div>

        <div class="label">Curriculum alignment</div>
        <div id="align" class="resource-meta"></div>
      </main>

      <!-- Right: Actions -->
      <aside class="card">
        <div class="label">Download</div>
        <div id="primaryDownload" class="resource-actions" style="flex-direction:column; gap:12px;"></div>

        <div class="hr"></div>

        <div class="label">Quick links</div>
        <div class="row">
          <a class="btn mini" href="/worksheet">Worksheet</a>
          <a class="btn mini" href="/units">Unit</a>
        </div>

        <div class="hr"></div>

        <div class="resource-meta">
          Phase 1: instant downloads.<br/>
          Phase 2: accounts, favorites, history.
        </div>
      </aside>
    </div>
  </div>

  <div class="footer">© Project Yellow Bird — calm, print-first resources.</div>

<script>
  const slug = decodeURIComponent(location.pathname.split("/").pop() || "");
  const el = (id) => document.getElementById(id);

  const badge = (t) => `<span class="badge">${t}</span>`;

  function fileRow(f){
    const label = (f.label || f.filename || f.type || "File").toString();
    // If it's a file, use /download/:assetId. If it's a link type, go direct to path.
    const href = (f.type || "").toLowerCase() === "link" ? (f.path || "#") : ("/download/" + encodeURIComponent(f.id || ""));
    const btnText = (f.type || "").toLowerCase() === "link" ? "Open" : "Download";

    return `
      <div class="card" style="padding:12px; margin-top:12px;">
        <div class="resource-meta">${(f.type || "").toUpperCase()}</div>
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
          <div style="font-weight:800;">${label}</div>
          <a class="btn primary mini" href="${href}">${btnText}</a>
        </div>
      </div>
    `;
  }

  async function load(){
    const res = await fetch("/api/library/resource/" + encodeURIComponent(slug));
    const data = await res.json();

    if(!data.ok){
      el("title").textContent = "Not found";
      el("desc").textContent = "This resource does not exist (yet).";
      return;
    }

    const r = data.resource || {};
    document.title = (r.title ? r.title + " — " : "") + "Project Yellow Bird";

    el("meta").textContent = `${(r.isFree !== false) ? "Free" : "Paid"} • ${(r.createdAt || "")}`;
    el("title").textContent = r.title || "Untitled";
    el("desc").textContent = r.description || "";

    const badges = [];
    if(r.grades && r.grades.length) badges.push(badge("Grade " + r.grades.join(", ")));
    if(r.subject) badges.push(badge(r.subject));
    if(r.strand) badges.push(badge(r.strand));
    (r.formats || []).slice(0,4).forEach(f => badges.push(badge(f)));
    if(r.prepTime) badges.push(badge(r.prepTime));
    if(r.isFree !== false) badges.push(badge("Free"));
    el("badges").innerHTML = badges.join("");

    const files = Array.isArray(r.files) ? r.files : [];
    el("files").innerHTML = files.length ? files.map(fileRow).join("") : `<div class="resource-meta">No files attached yet.</div>`;

    // Primary download: first non-link file if available, else first file
    const primary = files.find(f => (f.type||"").toLowerCase() !== "link") || files[0];
    if(primary){
      const href = (primary.type || "").toLowerCase() === "link"
        ? (primary.path || "#")
        : ("/download/" + encodeURIComponent(primary.id || ""));

      el("primaryDownload").innerHTML = `
        <a class="btn primary" href="${href}">${(primary.type||"").toLowerCase()==="link" ? "Open" : "Download"}</a>
        <a class="btn" href="/browse">Back to Browse</a>
      `;
    } else {
      el("primaryDownload").innerHTML = `<a class="btn" href="/browse">Back to Browse</a>`;
    }

    // Alignment
    const bits = [];
    if(r.jurisdiction) bits.push(`Jurisdiction: ${r.jurisdiction}`);
    if(r.subject) bits.push(`Subject: ${r.subject}`);
    if(r.strand) bits.push(`Strand: ${r.strand}`);
    if(r.ontarioExpectations && r.ontarioExpectations.length) bits.push(`Expectations: ${r.ontarioExpectations.join(", ")}`);
    el("align").textContent = bits.length ? bits.join(" • ") : "Add alignment details to resources.json when ready.";
  }

  load();
</script>
</body>
</html>
